<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rai — Team</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2a2d3e;
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Courier New', monospace; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .logo span { color: var(--green); }
  .back-btn { font-size: 13px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .back-btn:hover { color: var(--text); }

  /* Layout */
  .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  /* Invite card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 24px; }
  .card-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; font-family: 'Courier New', monospace; }

  /* Form */
  .form-row { display: flex; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s;
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--green); }
  .form-group select option { background: var(--surface); }

  .invite-btn {
    background: var(--green); color: #0f1117; border: none; border-radius: 6px;
    padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Courier New', monospace; letter-spacing: 0.5px; white-space: nowrap;
    align-self: flex-end; transition: opacity 0.15s;
  }
  .invite-btn:hover { opacity: 0.9; }
  .invite-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  .toast { display: none; margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 13px; }
  .toast.success { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); display: block; }
  .toast.error { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); display: block; }

  /* Team table */
  .team-table { width: 100%; border-collapse: collapse; }
  .team-table th { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0 10px; border-bottom: 1px solid var(--border); }
  .team-table td { padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
  .team-table tr:last-child td { border-bottom: none; }

  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--green); font-family: 'Courier New', monospace; flex-shrink: 0; }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .user-email { font-size: 13px; color: var(--muted); }

  .badge { display: inline-block; font-size: 11px; font-family: 'Courier New', monospace; padding: 3px 8px; border-radius: 4px; font-weight: 600; letter-spacing: 0.5px; }
  .badge.owner { background: rgba(74,222,128,0.1); color: var(--green); }
  .badge.admin { background: rgba(96,165,250,0.1); color: var(--blue); }
  .badge.viewer { background: var(--surface2); color: var(--muted); }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.active { background: var(--green); }
  .status-dot.pending { background: #f59e0b; }

  .loading { color: var(--muted); font-size: 14px; text-align: center; padding: 24px 0; }

  @media (max-width: 560px) {
    .form-row { flex-direction: column; }
    .invite-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">rai<span>.</span></div>
  <a class="back-btn" href="https://samglynn.github.io/pulse">← back to dashboard</a>
</div>

<div class="container">
  <div class="page-title">Team Access</div>
  <div class="page-sub">Invite your management team to Rai. They'll receive a branded email from noreply@heyrai.io.</div>

  <!-- Invite Form -->
  <div class="card">
    <div class="card-title">Invite a team member</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Email address</label>
        <input type="email" id="invite-email" placeholder="manager@restaurant.com" />
      </div>
      <div class="form-group" style="flex:1">
        <label>Role</label>
        <select id="invite-role">
          <option value="viewer">Viewer</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="invite-btn" id="invite-btn" onclick="sendInvite()">Send Invite →</button>
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <!-- Team Members -->
  <div class="card">
    <div class="card-title">Current team</div>
    <div id="team-list"><div class="loading">Loading team members...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wogtyrgckqoopzoziwbr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvZ3R5cmdja3Fvb3B6b3ppd2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTAxNTgsImV4cCI6MjA4ODk4NjE1OH0.9VQHHo9NX7Jf3cUpnljsXBI0jBQxjVzjPuqfQ8vGczI';

// Get session token from localStorage (Supabase stores it there)
function getToken() {
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('sb-') && key.endsWith('-auth-token')) {
      try {
        const val = JSON.parse(localStorage.getItem(key));
        return val?.access_token || null;
      } catch { return null; }
    }
  }
  return null;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.className = 'toast', 4000);
}

async function sendInvite() {
  const email = document.getElementById('invite-email').value.trim();
  const role = document.getElementById('invite-role').value;
  const btn = document.getElementById('invite-btn');

  if (!email) { showToast('Please enter an email address.', 'error'); return; }

  const token = getToken();
  if (!token) { showToast('You must be logged in to invite users.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/invite-user`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        'apikey': SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ email, role })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      showToast(data.error || 'Something went wrong.', 'error');
    } else {
      showToast(`✓ Invite sent to ${email}`, 'success');
      document.getElementById('invite-email').value = '';
      loadTeam();
    }
  } catch (err) {
    showToast('Network error — please try again.', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Send Invite →';
}

async function loadTeam() {
  const token = getToken();
  const headers = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/user_permissions?tenant_id=eq.a0000000-0000-0000-0000-000000000001&order=invited_at.asc&select=*`,
      { headers }
    );
    const members = await res.json();

    // Also get tenant_members for roles
    const tmRes = await fetch(
      `${SUPABASE_URL}/rest/v1/tenant_members?tenant_id=eq.a0000000-0000-0000-0000-000000000001&select=*`,
      { headers }
    );
    const tenantMembers = await tmRes.json();
    const roleMap = {};
    if (Array.isArray(tenantMembers)) tenantMembers.forEach(m => roleMap[m.user_id] = m.role);

    if (!Array.isArray(members) || members.length === 0) {
      document.getElementById('team-list').innerHTML = '<div class="loading">No team members yet.</div>';
      return;
    }

    const rows = members.map(m => {
      const initials = (m.display_name || m.email || '?').slice(0, 2).toUpperCase();
      const name = m.display_name || m.email.split('@')[0];
      const role = roleMap[m.user_id] || 'viewer';
      const isActive = !!m.accepted_at;
      return `
        <tr>
          <td>
            <div class="user-cell">
              <div class="avatar">${initials}</div>
              <div>
                <div style="font-weight:500">${name}</div>
                <div class="user-email">${m.email}</div>
              </div>
            </div>
          </td>
          <td><span class="badge ${role}">${role}</span></td>
          <td>
            <span class="status-dot ${isActive ? 'active' : 'pending'}"></span>
            <span style="font-size:13px;color:var(--muted)">${isActive ? 'Active' : 'Invite pending'}</span>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('team-list').innerHTML = `
      <table class="team-table">
        <thead>
          <tr>
            <th>Member</th>
            <th>Role</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    document.getElementById('team-list').innerHTML = '<div class="loading">Could not load team members.</div>';
  }
}

// Allow Enter key to submit
document.getElementById('invite-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendInvite();
});

loadTeam();
</script>
</body>
</html>
