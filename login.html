<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0C0E14;
      color: #EFF1F5;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-label {
      font-size: 11px;
      color: #6366F1;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 800;
      margin-top: 4px;
      background: linear-gradient(135deg, #6366F1, #14B8A6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      color: #6B7085;
      font-size: 13px;
      margin-top: 6px;
    }

    .card {
      background: #14161E;
      border: 1px solid #252839;
      border-radius: 14px;
      padding: 32px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #252839;
    }

    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #6B7085;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #EFF1F5;
      border-bottom-color: #6366F1;
    }

    .tab:hover:not(.active) {
      color: #B0B4C8;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6B7085;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #0C0E14;
      border: 1px solid #252839;
      border-radius: 8px;
      color: #EFF1F5;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #6366F1;
    }

    input::placeholder {
      color: #3D4055;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: #6366F1;
      color: #fff;
    }

    .btn-primary:hover {
      background: #5558E3;
    }

    .btn-primary:disabled {
      background: #3D4055;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: #6B7085;
      border: 1px solid #252839;
    }

    .btn-ghost:hover {
      color: #EFF1F5;
      border-color: #6B7085;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #252839;
    }

    .divider span {
      font-size: 11px;
      color: #6B7085;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .message.error {
      background: rgba(232, 80, 91, 0.1);
      border: 1px solid rgba(232, 80, 91, 0.3);
      color: #E8505B;
      display: block;
    }

    .message.success {
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.3);
      color: #14B8A6;
      display: block;
    }

    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .forgot-link a {
      font-size: 12px;
      color: #6366F1;
      text-decoration: none;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #6B7085;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Reset password view */
    .view { display: none; }
    .view.active { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand">
      <div class="brand-label">Water Street Advisors</div>
      <div class="brand-name">Pulse</div>
      <div class="brand-sub">Restaurant Intelligence</div>
    </div>

    <!-- Sign In / Sign Up View -->
    <div class="card" id="authCard">
      <div class="tabs">
        <div class="tab active" data-tab="signin" onclick="switchTab('signin')">Sign In</div>
        <div class="tab" data-tab="signup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <div id="message" class="message"></div>

      <!-- Sign In Form -->
      <div class="view active" id="signinView">
        <form id="signinForm" onsubmit="handleSignIn(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signinEmail" placeholder="you@restaurant.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signinPassword" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <div class="forgot-link">
            <a href="#" onclick="showReset(event)">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary" id="signinBtn">Sign In</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="btn btn-ghost" onclick="handleMagicLink()">Send me a magic link</button>
      </div>

      <!-- Sign Up Form -->
      <div class="view" id="signupView">
        <form id="signupForm" onsubmit="handleSignUp(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@restaurant.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="signupConfirm" placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Reset Password View -->
    <div class="card" id="resetCard" style="display:none;">
      <h3 style="font-size:16px;margin-bottom:20px;">Reset Password</h3>
      <div id="resetMessage" class="message"></div>
      <form onsubmit="handleReset(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="resetEmail" placeholder="you@restaurant.com" required>
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn">Send Reset Link</button>
      </form>
      <button class="btn btn-ghost" style="margin-top:12px;" onclick="hideReset()">Back to sign in</button>
    </div>

    <div class="footer">Pulse by Water Street Advisors</div>
  </div>

  <script>
    // === Supabase config ===
    const SUPABASE_URL = 'https://wogtyrgckqoopzoziwbr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvZ3R5cmdja3Fvb3B6b3ppd2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTAxNTgsImV4cCI6MjA4ODk4NjE1OH0.9VQHHo9NX7Jf3cUpnljsXBI0jBQxjVzjPuqfQ8vGczI';

    // Where to redirect after successful login — update this to your dashboard URL
    const DASHBOARD_URL = './index.html';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // === Check if already logged in ===
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = DASHBOARD_URL;
      }
    })();

    // === Listen for auth changes (handles magic link + password reset callbacks) ===
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        window.location.href = DASHBOARD_URL;
      }
      if (event === 'PASSWORD_RECOVERY') {
        // User clicked a password reset link — show a prompt to set new password
        const newPassword = prompt('Enter your new password (min 6 characters):');
        if (newPassword && newPassword.length >= 6) {
          supabase.auth.updateUser({ password: newPassword }).then(({ error }) => {
            if (error) {
              alert('Error updating password: ' + error.message);
            } else {
              alert('Password updated! You are now signed in.');
              window.location.href = DASHBOARD_URL;
            }
          });
        }
      }
    });

    // === Tab switching ===
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('signinView').classList.toggle('active', tab === 'signin');
      document.getElementById('signupView').classList.toggle('active', tab === 'signup');
      clearMessage();
    }

    // === Messages ===
    function showMessage(text, type = 'error') {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    function clearMessage() {
      const el = document.getElementById('message');
      el.className = 'message';
      el.textContent = '';
    }

    // === Sign In ===
    async function handleSignIn(e) {
      e.preventDefault();
      const btn = document.getElementById('signinBtn');
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      clearMessage();

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showMessage(error.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
      // Success handled by onAuthStateChange
    }

    // === Sign Up ===
    async function handleSignUp(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (password !== confirm) {
        showMessage('Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account...';
      clearMessage();

      const { error } = await supabase.auth.signUp({ email, password });

      if (error) {
        showMessage(error.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        showMessage('Check your email for a confirmation link.', 'success');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // === Magic Link ===
    async function handleMagicLink() {
      const email = document.getElementById('signinEmail').value.trim();
      if (!email) {
        showMessage('Enter your email first, then click "Send me a magic link".');
        return;
      }

      clearMessage();

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + window.location.pathname }
      });

      if (error) {
        showMessage(error.message);
      } else {
        showMessage('Magic link sent! Check your inbox.', 'success');
      }
    }

    // === Password Reset ===
    function showReset(e) {
      e.preventDefault();
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('resetCard').style.display = 'block';
      // Pre-fill with sign-in email if available
      const email = document.getElementById('signinEmail').value;
      if (email) document.getElementById('resetEmail').value = email;
    }

    function hideReset() {
      document.getElementById('authCard').style.display = 'block';
      document.getElementById('resetCard').style.display = 'none';
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const email = document.getElementById('resetEmail').value.trim();

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Sending...';

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });

      const msgEl = document.getElementById('resetMessage');
      if (error) {
        msgEl.textContent = error.message;
        msgEl.className = 'message error';
      } else {
        msgEl.textContent = 'Reset link sent! Check your inbox.';
        msgEl.className = 'message success';
      }

      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  </script>
</body>
</html>
